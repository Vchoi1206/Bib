<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 말씀 카드 아카이빙</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background-color: #f4f7f6; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #cbd5e0; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }
        .panel { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .panel.active { display: block; }
        select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { padding: 10px; background: #3498db; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .verse-item { padding: 5px 0; border-bottom: 1px solid #eee; }
        .word-card { background: #fffcf0; border: 1px solid #f39c12; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<h1>📖 말씀 아카이빙</h1>
<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('read-panel', this)">📖 성경 열람</button>
    <button class="tab-btn" onclick="switchTab('create-panel', this)">✍️ 카드 생성</button>
    <button class="tab-btn" onclick="switchTab('view-panel', this)">🗂️ 보관함</button>
</div>

<div id="read-panel" class="panel active">
    <select id="readBook" onchange="updateChapters('readBook', 'readChapter'); loadBibleVerses();"></select>
    <select id="readChapter" onchange="loadBibleVerses()"></select>
    <div id="bibleViewer" style="margin-top:15px; height: 300px; overflow-y: auto;"></div>
</div>

<div id="create-panel" class="panel">
    <select id="cardBook" onchange="updateChapters('cardBook', 'cardChapter');"></select>
    <select id="cardChapter"></select>
    <div style="display:flex; gap:5px;">
        <input type="number" id="startVerse" placeholder="시작 절" onchange="loadCardPreview()">
        <input type="number" id="endVerse" placeholder="끝 절" onchange="loadCardPreview()">
    </div>
    <textarea id="cardText" rows="10" placeholder="범위를 입력하면 본문이 표시됩니다."></textarea>
    <input type="text" id="cardKeyword" placeholder="키워드">
    <textarea id="cardMemo" rows="3" placeholder="묵상 기록"></textarea>
    <button onclick="saveWordCard()" style="width:100%;">💝 저장하기</button>
</div>

<div id="view-panel" class="panel">
    <div id="keywordFilter"></div>
    <div id="savedCardsDisplay"></div>
</div>

<script>
    const ntBooks = [{ id: "mat", name: "마태복음", chapters: 28 }, { id: "mrk", name: "마가복음", chapters: 16 }, { id: "luk", name: "누가복음", chapters: 24 }, { id: "jhn", name: "요한복음", chapters: 21 }, { id: "act", name: "사도행전", chapters: 28 }, { id: "rom", name: "로마서", chapters: 16 }, { id: "1co", name: "고린도전서", chapters: 16 }, { id: "2co", name: "고린도후서", chapters: 13 }, { id: "gal", name: "갈라디아서", chapters: 6 }, { id: "eph", name: "에베소서", chapters: 6 }, { id: "php", name: "빌립보서", chapters: 4 }, { id: "col", name: "골로새서", chapters: 4 }, { id: "1th", name: "데살로니가전서", chapters: 5 }, { id: "2th", name: "데살로니가후서", chapters: 3 }, { id: "1ti", name: "디모데전서", chapters: 6 }, { id: "2ti", name: "디모데후서", chapters: 4 }, { id: "tit", name: "디도서", chapters: 3 }, { id: "phm", name: "빌레몬서", chapters: 1 }, { id: "heb", name: "히브리서", chapters: 13 }, { id: "jas", name: "야고보서", chapters: 5 }, { id: "1pe", name: "베드로전서", chapters: 5 }, { id: "2pe", name: "베드로후서", chapters: 3 }, { id: "1jn", name: "요한일서", chapters: 5 }, { id: "2jn", name: "요한이서", chapters: 1 }, { id: "3jn", name: "요한삼서", chapters: 1 }, { id: "jud", name: "유다서", chapters: 1 }, { id: "rev", name: "요한계시록", chapters: 22 }];

    async function getBibleData(bookId) {
        const book = ntBooks.find(b => b.id === bookId);
        const res = await fetch(`./krv/${book.name}.json`);
        return await res.json();
    }

    // 💡 검증된 로직 그대로 사용
    async function loadBibleVerses() {
        const bookId = document.getElementById("readBook").value;
        const chapter = document.getElementById("readChapter").value;
        const viewer = document.getElementById("bibleViewer");
        const data = await getBibleData(bookId);
        const target = data.chapters.find(c => c.chapter == chapter);
        viewer.innerHTML = target.verses.map(v => `<div class="verse-item"><b>${v.verse}</b> ${v.text}</div>`).join('');
    }

    // 💡 카드 생성 탭: 검증된 로직 기반으로 범위 필터링 추가
    async function loadCardPreview() {
        const bookId = document.getElementById("cardBook").value;
        const chapter = document.getElementById("cardChapter").value;
        const start = parseInt(document.getElementById("startVerse").value);
        const end = parseInt(document.getElementById("endVerse").value);
        if(!start || !end) return;
        
        const data = await getBibleData(bookId);
        const target = data.chapters.find(c => c.chapter == chapter);
        const filtered = target.verses.filter(v => v.verse >= start && v.verse <= end);
        document.getElementById("cardText").value = filtered.map(v => `${v.verse}절: ${v.text}`).join("\n");
    }

    // ... [switchTab, saveWordCard, renderCards 등 기타 함수는 동일] ...
    function switchTab(pId, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pId).classList.add('active');
        btn.classList.add('active');
    }

    function updateChapters(bId, cId) {
        const book = ntBooks.find(b => b.id === document.getElementById(bId).value);
        const sel = document.getElementById(cId);
        sel.innerHTML = "";
        for(let i=1; i<=book.chapters; i++) sel.innerHTML += `<option value="${i}">${i}장</option>`;
    }

    window.onload = () => {
        ['readBook', 'cardBook'].forEach(id => {
            ntBooks.forEach(b => document.getElementById(id).innerHTML += `<option value="${b.id}">${b.name}</option>`);
        });
        updateChapters('readBook', 'readChapter');
        updateChapters('cardBook', 'cardChapter');
        loadBibleVerses();
    };
</script>
</body>
</html>
