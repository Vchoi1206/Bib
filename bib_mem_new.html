<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 말씀 카드 아카이빙</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background-color: #f4f7f6; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #cbd5e0; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }
        .panel { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .panel.active { display: block; }
        select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .verse-item { padding: 5px 0; border-bottom: 1px solid #eee; }
        .word-card { background: #fffcf0; border: 1px solid #f39c12; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<h1>📖 말씀 아카이빙</h1>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('read-panel', this)">📖 성경 열람</button>
    <button class="tab-btn" onclick="switchTab('create-panel', this)">✍️ 카드 생성</button>
    <button class="tab-btn" onclick="switchTab('view-panel', this)">🗂️ 보관함</button>
</div>

<div id="read-panel" class="panel active">
    <select id="readBook" onchange="updateChapters('readBook', 'readChapter'); loadBibleVerses();"></select>
    <select id="readChapter" onchange="loadBibleVerses()"></select>
    <div id="bibleViewer" style="margin-top:15px; height: 350px; overflow-y: auto;"></div>
</div>

<div id="create-panel" class="panel">
    <select id="cardBook" onchange="updateChapters('cardBook', 'cardChapter'); loadCardPreview();"></select>
    <select id="cardChapter" onchange="loadCardPreview()"></select>
    <div style="display:flex; gap:5px;">
        <input type="number" id="startVerse" placeholder="시작 절" onchange="loadCardPreview()">
        <input type="number" id="endVerse" placeholder="끝 절" onchange="loadCardPreview()">
    </div>
    <textarea id="cardText" rows="10" readonly placeholder="범위를 선택하면 본문이 표시됩니다."></textarea>
    <input type="text" id="cardKeyword" placeholder="키워드 (예: 믿음, 위로)">
    <textarea id="cardMemo" rows="3" placeholder="나의 묵상 기록"></textarea>
    <button onclick="saveWordCard()">💝 말씀 카드 저장하기</button>
</div>

<div id="view-panel" class="panel">
    <div id="keywordFilter" style="margin-bottom:15px;"></div>
    <div id="savedCardsDisplay"></div>
</div>

<script>
    const ntBooks = [
        { id: "mat", name: "마태복음", chapters: 28 }, { id: "mrk", name: "마가복음", chapters: 16 },
        { id: "luk", name: "누가복음", chapters: 24 }, { id: "jhn", name: "요한복음", chapters: 21 },
        { id: "act", name: "사도행전", chapters: 28 }, { id: "rom", name: "로마서", chapters: 16 },
        { id: "1co", name: "고린도전서", chapters: 16 }, { id: "2co", name: "고린도후서", chapters: 13 },
        { id: "gal", name: "갈라디아서", chapters: 6 }, { id: "eph", name: "에베소서", chapters: 6 },
        { id: "php", name: "빌립보서", chapters: 4 }, { id: "col", name: "골로새서", chapters: 4 },
        { id: "1th", name: "데살로니가전서", chapters: 5 }, { id: "2th", name: "데살로니가후서", chapters: 3 },
        { id: "1ti", name: "디모데전서", chapters: 6 }, { id: "2ti", name: "디모데후서", chapters: 4 },
        { id: "tit", name: "디도서", chapters: 3 }, { id: "phm", name: "빌레몬서", chapters: 1 },
        { id: "heb", name: "히브리서", chapters: 13 }, { id: "jas", name: "야고보서", chapters: 5 },
        { id: "1pe", name: "베드로전서", chapters: 5 }, { id: "2pe", name: "베드로후서", chapters: 3 },
        { id: "1jn", name: "요한일서", chapters: 5 }, { id: "2jn", name: "요한이서", chapters: 1 },
        { id: "3jn", name: "요한삼서", chapters: 1 }, { id: "jud", name: "유다서", chapters: 1 },
        { id: "rev", name: "요한계시록", chapters: 22 }
    ];

    // 공통: 탭 전환 및 색상 변경
    function switchTab(panelId, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
        btn.classList.add('active');
        if(panelId === 'view-panel') renderCards('전체');
    }

    // 공통: 장 업데이트
    function updateChapters(bId, cId) {
        const book = ntBooks.find(b => b.id === document.getElementById(bId).value);
        const sel = document.getElementById(cId);
        sel.innerHTML = "";
        for(let i=1; i<=book.chapters; i++) sel.innerHTML += `<option value="${i}">${i}장</option>`;
    }

    // 로직: 열람 탭
    async function loadBibleVerses() {
        const book = ntBooks.find(b => b.id === document.getElementById("readBook").value);
        const ch = document.getElementById("readChapter").value;
        const res = await fetch(`./krv/${book.name}.json`);
        const data = await res.json();
        const target = data.chapters.find(c => c.chapter == ch);
        document.getElementById("bibleViewer").innerHTML = target.verses.map(v => `<div class="verse-item"><b>${v.verse}</b> ${v.text}</div>`).join('');
    }

    // 로직: 카드생성 탭
    async function loadCardPreview() {
        const book = ntBooks.find(b => b.id === document.getElementById("cardBook").value);
        const ch = document.getElementById("cardChapter").value;
        const start = parseInt(document.getElementById("startVerse").value);
        const end = parseInt(document.getElementById("endVerse").value);
        
        const res = await fetch(`./krv/${book.name}.json`);
        const data = await res.json();
        const target = data.chapters.find(c => c.chapter == ch);
        
        if(start && end && target) {
            const v = target.verses.filter(x => x.verse >= start && x.verse <= end);
            document.getElementById("cardText").value = v.map(i => `${i.verse}절: ${i.text}`).join("\n");
        }
    }

    function saveWordCard() {
        const card = {
            id: Date.now(),
            info: document.getElementById("cardBook").options[document.getElementById("cardBook").selectedIndex].text + " " + document.getElementById("cardChapter").value + "장",
            text: document.getElementById("cardText").value,
            keyword: document.getElementById("cardKeyword").value || "기타",
            memo: document.getElementById("cardMemo").value
        };
        let cards = JSON.parse(localStorage.getItem("myCards") || "[]");
        cards.push(card);
        localStorage.setItem("myCards", JSON.stringify(cards));
        alert("저장되었습니다!");
    }

    // 로직: 보관함 탭 (키워드 필터)
    function renderCards(filter) {
        const cards = JSON.parse(localStorage.getItem("myCards") || "[]");
        const keywords = ["전체", ...new Set(cards.map(c => c.keyword))];
        document.getElementById("keywordFilter").innerHTML = keywords.map(k => `<button onclick="renderCards('${k}')" style="width:auto; padding:5px 10px;">${k}</button>`).join(' ');
        
        const display = filter === "전체" ? cards : cards.filter(c => c.keyword === filter);
        document.getElementById("savedCardsDisplay").innerHTML = display.map(c => `
            <div class="word-card"><b>${c.info} [${c.keyword}]</b><p>${c.text}</p><small>${c.memo}</small></div>
        `).join('');
    }

    window.onload = () => {
        ['readBook', 'cardBook'].forEach(id => {
            ntBooks.forEach(b => document.getElementById(id).innerHTML += `<option value="${b.id}">${b.name}</option>`);
        });
        updateChapters('readBook', 'readChapter');
        updateChapters('cardBook', 'cardChapter');
        loadBibleVerses();
    };
</script>
</body>
</html>
