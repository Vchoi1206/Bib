<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Card Archive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --cream: #f4f8f4;
            --parchment: #e6f0e6;
            --green: #3a7d44;
            --green-light: #6aab6e;
            --green-pale: #c8e6c9;
            --ink: #1a2e1a;
            --ink-soft: #3d5c3d;
            --ink-faint: #7a9c7a;
            --border: #b2d0b2;
            --white: #ffffff;
            --red-soft: #c0392b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--cream);
            min-height: 100vh;
            color: var(--ink);
        }

        header {
            text-align: center;
            padding: 32px 20px 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, var(--white) 0%, var(--cream) 100%);
        }

        header h1 {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px 60px;
        }

        /* ─── Tabs ─── */
        .tabs {
            display: flex;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            background: var(--white);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: var(--white);
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--ink-faint);
            transition: all 0.2s;
            border-right: 1px solid var(--border);
        }

        .tab-btn:last-child { border-right: none; }
        .tab-btn:hover { background: var(--parchment); color: var(--ink); }
        .tab-btn.active { background: var(--green); color: var(--white); }

        .tab-hint {
            font-size: 0.74rem;
            color: var(--ink-faint);
            margin-bottom: 16px;
            padding-left: 2px;
        }

        .panel { display: none; }
        .panel.active { display: block; }

        .card-box {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(58,125,68,0.07);
        }

        /* ─── Testament Toggle ─── */
        .testament-toggle {
            display: flex;
            gap: 0;
            margin-bottom: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .testament-btn {
            flex: 1;
            padding: 9px;
            border: none;
            background: var(--white);
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--ink-faint);
            transition: all 0.2s;
            border-right: 1px solid var(--border);
        }

        .testament-btn:last-child { border-right: none; }
        .testament-btn.active { background: var(--green-pale); color: var(--green); }

        .row { display: flex; gap: 10px; margin-bottom: 12px; }
        .row > * { flex: 1; }

        select, input[type="number"], input[type="text"], textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 7px;
            background: var(--cream);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.85rem;
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--green);
            background: var(--white);
        }

        label {
            display: block;
            font-size: 0.74rem;
            font-weight: 500;
            color: var(--ink-faint);
            letter-spacing: 0.05em;
            margin-bottom: 5px;
            margin-top: 14px;
        }

        label:first-child { margin-top: 0; }

        textarea {
            resize: vertical;
            line-height: 1.8;
            font-family: 'Noto Serif KR', serif;
        }

        /* ─── Bible Viewer ─── */
        #bibleViewer {
            margin-top: 16px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
        }

        #bibleViewer::-webkit-scrollbar { width: 4px; }
        #bibleViewer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .verse-item {
            display: flex;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--parchment);
            line-height: 1.8;
            font-size: 0.9rem;
            font-family: 'Noto Serif KR', serif;
        }

        .verse-item:last-child { border-bottom: none; }

        .verse-num {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.7rem;
            color: var(--green);
            font-weight: 700;
            min-width: 22px;
            padding-top: 4px;
        }

        /* ─── Buttons ─── */
        .btn {
            display: block;
            width: 100%;
            padding: 13px;
            margin-top: 16px;
            border: none;
            border-radius: 8px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--green); color: var(--white); }
        .btn-primary:hover { background: #2e6335; }

        /* ─── Keyword Filter ─── */
        #keywordFilter {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 16px;
        }

        .kw-badge {
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 0.76rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--ink-soft);
            transition: all 0.2s;
            font-weight: 500;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .kw-badge:hover, .kw-badge.active {
            background: var(--green);
            border-color: var(--green);
            color: var(--white);
        }

        /* ─── Word Cards ─── */
        .word-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-left: 4px solid var(--green);
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 14px;
            transition: box-shadow 0.2s;
        }

        .word-card:hover { box-shadow: 0 4px 16px rgba(58,125,68,0.12); }

        .word-card-ref {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.74rem;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 0.07em;
            margin-bottom: 8px;
        }

        .word-card-text {
            font-family: 'Noto Serif KR', serif;
            font-size: 0.9rem;
            line-height: 1.85;
            color: var(--ink);
            white-space: pre-wrap;
        }

        .word-card-kw {
            display: inline-block;
            margin-top: 10px;
            padding: 3px 10px;
            background: var(--parchment);
            border-radius: 12px;
            font-size: 0.72rem;
            color: var(--ink-soft);
            font-weight: 500;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .word-card-memo {
            margin-top: 10px;
            padding: 10px 12px;
            background: var(--cream);
            border-radius: 6px;
            font-family: 'Noto Serif KR', serif;
            font-size: 0.82rem;
            color: var(--ink-soft);
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .word-card-memo::before { content: "✦ "; color: var(--green); font-size: 0.7rem; }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .btn-edit, .btn-delete {
            padding: 5px 14px;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            transition: all 0.2s;
        }

        .btn-edit {
            background: var(--parchment);
            color: var(--ink-soft);
            border: 1px solid var(--border);
        }

        .btn-edit:hover { background: var(--green-pale); color: var(--green); }

        .btn-delete {
            background: #fdf0ef;
            color: var(--red-soft);
            border: 1px solid #f5c6c2;
        }

        .btn-delete:hover { background: #f5c6c2; }

        .edit-form {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* ─── States ─── */
        .empty-state {
            text-align: center;
            padding: 48px 0;
            color: var(--ink-faint);
            font-size: 0.85rem;
            line-height: 2;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .status-msg {
            text-align: center;
            padding: 32px 0;
            color: var(--ink-faint);
            font-size: 0.85rem;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .status-err { color: var(--red-soft); }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--ink);
            color: var(--white);
            padding: 11px 24px;
            border-radius: 24px;
            font-size: 0.83rem;
            font-family: 'Noto Sans KR', sans-serif;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 999;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header>
    <h1>Word Card Archive</h1>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('read-panel', this)">📖 성경 열람</button>
        <button class="tab-btn" onclick="switchTab('create-panel', this)">✍️ 카드 생성</button>
        <button class="tab-btn" onclick="switchTab('view-panel', this)">🗂️ 보관함</button>
    </div>

    <!-- 성경 열람 -->
    <div id="read-panel" class="panel active">
        <p class="tab-hint">성경책과 장을 선택하면 본문이 표시됩니다.</p>
        <div class="card-box">
            <div class="testament-toggle">
                <button class="testament-btn active" onclick="switchTestament('ot', this)">구약</button>
                <button class="testament-btn" onclick="switchTestament('nt', this)">신약</button>
            </div>
            <div class="row">
                <div>
                    <label>성경책</label>
                    <select id="readBook" onchange="updateChapters('readBook','readChapter'); loadBibleVerses();"></select>
                </div>
                <div>
                    <label>장</label>
                    <select id="readChapter" onchange="loadBibleVerses()"></select>
                </div>
            </div>
            <div id="bibleViewer">
                <div class="status-msg">성경책과 장을 선택해 주세요.</div>
            </div>
        </div>
    </div>

    <!-- 카드 생성 -->
    <div id="create-panel" class="panel">
        <p class="tab-hint">말씀 범위를 선택하고 묵상을 기록해 카드로 저장하세요.</p>
        <div class="card-box">
            <div class="testament-toggle">
                <button class="testament-btn active" onclick="switchTestamentCard('ot', this)">구약</button>
                <button class="testament-btn" onclick="switchTestamentCard('nt', this)">신약</button>
            </div>
            <div class="row">
                <div>
                    <label>성경책</label>
                    <select id="cardBook" onchange="updateChapters('cardBook','cardChapter');"></select>
                </div>
                <div>
                    <label>장</label>
                    <select id="cardChapter"></select>
                </div>
            </div>
            <div class="row">
                <div>
                    <label>시작 절</label>
                    <input type="number" id="startVerse" placeholder="예: 1" min="1">
                </div>
                <div>
                    <label>끝 절</label>
                    <input type="number" id="endVerse" placeholder="예: 5" min="1">
                </div>
            </div>
            <button class="btn btn-primary" style="margin-top:4px;" onclick="loadCardPreview()">본문 불러오기</button>
            <label>본문</label>
            <textarea id="cardText" rows="8" placeholder="위에서 불러오거나 직접 입력하세요."></textarea>
            <label>키워드</label>
            <input type="text" id="cardKeyword" placeholder="예: 은혜, 회복, 소망">
            <label>묵상 기록</label>
            <textarea id="cardMemo" rows="3" placeholder="오늘 이 말씀에서 받은 은혜를 기록해 보세요."></textarea>
            <button class="btn btn-primary" onclick="saveWordCard()">💝 저장하기</button>
        </div>
    </div>

    <!-- 보관함 -->
    <div id="view-panel" class="panel">
        <p class="tab-hint">저장된 말씀 카드를 키워드로 필터링하거나 수정·삭제할 수 있습니다.</p>
        <div id="keywordFilter"></div>
        <div id="savedCardsDisplay"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const otBooks = [
        { id: "gen", name: "창세기",     file: "genesis",       chapters: 50 },
        { id: "exo", name: "출애굽기",   file: "exodus",        chapters: 40 },
        { id: "lev", name: "레위기",     file: "leviticus",     chapters: 27 },
        { id: "num", name: "민수기",     file: "numbers",       chapters: 36 },
        { id: "deu", name: "신명기",     file: "deuteronomy",   chapters: 34 },
        { id: "jos", name: "여호수아",   file: "joshua",        chapters: 24 },
        { id: "jdg", name: "사사기",     file: "judges",        chapters: 21 },
        { id: "rut", name: "룻기",       file: "ruth",          chapters: 4  },
        { id: "1sa", name: "사무엘상",   file: "1samuel",       chapters: 31 },
        { id: "2sa", name: "사무엘하",   file: "2samuel",       chapters: 24 },
        { id: "1ki", name: "열왕기상",   file: "1kings",        chapters: 22 },
        { id: "2ki", name: "열왕기하",   file: "2kings",        chapters: 25 },
        { id: "1ch", name: "역대상",     file: "1chronicles",   chapters: 29 },
        { id: "2ch", name: "역대하",     file: "2chronicles",   chapters: 36 },
        { id: "ezr", name: "에스라",     file: "ezra",          chapters: 10 },
        { id: "neh", name: "느헤미야",   file: "nehemiah",      chapters: 13 },
        { id: "est", name: "에스더",     file: "esther",        chapters: 10 },
        { id: "job", name: "욥기",       file: "job",           chapters: 42 },
        { id: "psa", name: "시편",       file: "psalms",        chapters: 150 },
        { id: "pro", name: "잠언",       file: "proverbs",      chapters: 31 },
        { id: "ecc", name: "전도서",     file: "ecclesiastes",  chapters: 12 },
        { id: "sng", name: "아가",       file: "song",          chapters: 8  },
        { id: "isa", name: "이사야",     file: "isaiah",        chapters: 66 },
        { id: "jer", name: "예레미야",   file: "jeremiah",      chapters: 52 },
        { id: "lam", name: "예레미야애가", file: "lamentations", chapters: 5  },
        { id: "ezk", name: "에스겔",     file: "ezekiel",       chapters: 48 },
        { id: "dan", name: "다니엘",     file: "daniel",        chapters: 12 },
        { id: "hos", name: "호세아",     file: "hosea",         chapters: 14 },
        { id: "jol", name: "요엘",       file: "joel",          chapters: 3  },
        { id: "amo", name: "아모스",     file: "amos",          chapters: 9  },
        { id: "oba", name: "오바댜",     file: "obadiah",       chapters: 1  },
        { id: "jon", name: "요나",       file: "jonah",         chapters: 4  },
        { id: "mic", name: "미가",       file: "micah",         chapters: 7  },
        { id: "nam", name: "나훔",       file: "nahum",         chapters: 3  },
        { id: "hab", name: "하박국",     file: "habakkuk",      chapters: 3  },
        { id: "zep", name: "스바냐",     file: "zephaniah",     chapters: 3  },
        { id: "hag", name: "학개",       file: "haggai",        chapters: 2  },
        { id: "zec", name: "스가랴",     file: "zechariah",     chapters: 14 },
        { id: "mal", name: "말라기",     file: "malachi",       chapters: 4  },
    ];

    const ntBooks = [
        { id: "mat", name: "마태복음",     file: "matthew",        chapters: 28 },
        { id: "mrk", name: "마가복음",     file: "mark",           chapters: 16 },
        { id: "luk", name: "누가복음",     file: "luke",           chapters: 24 },
        { id: "jhn", name: "요한복음",     file: "john",           chapters: 21 },
        { id: "act", name: "사도행전",     file: "acts",           chapters: 28 },
        { id: "rom", name: "로마서",       file: "romans",         chapters: 16 },
        { id: "1co", name: "고린도전서",   file: "1corinthians",   chapters: 16 },
        { id: "2co", name: "고린도후서",   file: "2corinthians",   chapters: 13 },
        { id: "gal", name: "갈라디아서",   file: "galatians",      chapters: 6  },
        { id: "eph", name: "에베소서",     file: "ephesians",      chapters: 6  },
        { id: "php", name: "빌립보서",     file: "philippians",    chapters: 4  },
        { id: "col", name: "골로새서",     file: "colossians",     chapters: 4  },
        { id: "1th", name: "데살로니가전서", file: "1thessalonians", chapters: 5 },
        { id: "2th", name: "데살로니가후서", file: "2thessalonians", chapters: 3 },
        { id: "1ti", name: "디모데전서",   file: "1timothy",       chapters: 6  },
        { id: "2ti", name: "디모데후서",   file: "2timothy",       chapters: 4  },
        { id: "tit", name: "디도서",       file: "titus",          chapters: 3  },
        { id: "phm", name: "빌레몬서",     file: "philemon",       chapters: 1  },
        { id: "heb", name: "히브리서",     file: "hebrews",        chapters: 13 },
        { id: "jas", name: "야고보서",     file: "james",          chapters: 5  },
        { id: "1pe", name: "베드로전서",   file: "1peter",         chapters: 5  },
        { id: "2pe", name: "베드로후서",   file: "2peter",         chapters: 3  },
        { id: "1jn", name: "요한일서",     file: "1john",          chapters: 5  },
        { id: "2jn", name: "요한이서",     file: "2john",          chapters: 1  },
        { id: "3jn", name: "요한삼서",     file: "3john",          chapters: 1  },
        { id: "jud", name: "유다서",       file: "jude",           chapters: 1  },
        { id: "rev", name: "요한계시록",   file: "revelation",     chapters: 22 },
    ];

    let currentReadTestament = 'ot';
    let currentCardTestament = 'ot';

    function switchTestament(type, btn) {
        currentReadTestament = type;
        document.querySelectorAll('#read-panel .testament-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        populateBookSelect('readBook', type === 'ot' ? otBooks : ntBooks);
        updateChapters('readBook', 'readChapter');
        loadBibleVerses();
    }

    function switchTestamentCard(type, btn) {
        currentCardTestament = type;
        document.querySelectorAll('#create-panel .testament-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        populateBookSelect('cardBook', type === 'ot' ? otBooks : ntBooks);
        updateChapters('cardBook', 'cardChapter');
    }

    function populateBookSelect(selectId, books) {
        const sel = document.getElementById(selectId);
        sel.innerHTML = "";
        books.forEach(b => {
            const opt = document.createElement("option");
            opt.value = b.id;
            opt.textContent = b.name;
            sel.appendChild(opt);
        });
    }

    function getBook(bookId) {
        return [...otBooks, ...ntBooks].find(b => b.id === bookId);
    }

    async function getBibleData(bookId) {
        const book = getBook(bookId);
        if (!book) throw new Error(`책 ID를 찾을 수 없음: ${bookId}`);
        const url = `./krv_eng/${book.file}.json`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`파일 로드 실패 (${res.status}): ${url}`);
        return await res.json();
    }

    async function loadBibleVerses() {
        const bookId  = document.getElementById("readBook").value;
        const chapter = document.getElementById("readChapter").value;
        const viewer  = document.getElementById("bibleViewer");

        viewer.innerHTML = '<div class="status-msg">📖 말씀을 불러오는 중입니다...</div>';

        try {
            const data = await getBibleData(bookId);
            let verses = [];
            if (data.chapters && Array.isArray(data.chapters)) {
                const targetChapter = data.chapters.find(c => c.chapter == chapter);
                if (targetChapter && targetChapter.verses) {
                    verses = targetChapter.verses.map(v => ({ verse: v.verse, text: v.text }));
                }
            } else if (Array.isArray(data)) {
                verses = data.filter(v => v.chapter == chapter);
            }

            if (verses.length === 0) {
                viewer.innerHTML = `<div class="status-msg status-err">⚠️ ${chapter}장 데이터를 불러올 수 없습니다.</div>`;
                return;
            }

            viewer.innerHTML = "";
            verses.forEach(v => {
                const div = document.createElement("div");
                div.className = "verse-item";
                div.innerHTML = `<span class="verse-num">${v.verse}</span><span>${v.text}</span>`;
                viewer.appendChild(div);
            });

        } catch (err) {
            console.error("말씀 로딩 에러:", err);
            viewer.innerHTML = `<div class="status-msg status-err">⚠️ 오류: ${err.message}</div>`;
        }
    }

    async function loadCardPreview() {
        const bookId   = document.getElementById("cardBook").value;
        const chapter  = document.getElementById("cardChapter").value;
        const start    = parseInt(document.getElementById("startVerse").value);
        const end      = parseInt(document.getElementById("endVerse").value);
        const textarea = document.getElementById("cardText");

        if (!start || !end) { showToast("시작 절과 끝 절을 입력해 주세요."); return; }
        if (start > end)    { showToast("시작 절이 끝 절보다 클 수 없어요."); return; }

        textarea.value = "불러오는 중...";

        try {
            const data = await getBibleData(bookId);
            let verses = [];
            if (data.chapters && Array.isArray(data.chapters)) {
                const targetChapter = data.chapters.find(c => c.chapter == chapter);
                if (targetChapter && targetChapter.verses) {
                    verses = targetChapter.verses.filter(v => v.verse >= start && v.verse <= end);
                }
            } else if (Array.isArray(data)) {
                verses = data.filter(v => v.chapter == chapter && v.verse >= start && v.verse <= end);
            }

            if (verses.length === 0) {
                textarea.value = "";
                showToast("해당 범위의 말씀을 찾을 수 없어요.");
                return;
            }
            textarea.value = verses.map(v => `${v.verse}절  ${v.text}`).join("\n");

        } catch (err) {
            textarea.value = "";
            showToast(`오류: ${err.message}`);
        }
    }

    function saveWordCard() {
        const bookId  = document.getElementById("cardBook").value;
        const chapter = document.getElementById("cardChapter").value;
        const start   = document.getElementById("startVerse").value;
        const end     = document.getElementById("endVerse").value;
        const text    = document.getElementById("cardText").value.trim();
        const keyword = document.getElementById("cardKeyword").value.trim();
        const memo    = document.getElementById("cardMemo").value.trim();

        if (!text) { showToast("본문을 먼저 불러와 주세요."); return; }

        const book = getBook(bookId);
        const ref  = `${book.name} ${chapter}장 ${start}-${end}절`;
        const card = { ref, text, keyword, memo, date: new Date().toLocaleDateString("ko-KR") };

        const saved = getSavedCards();
        saved.push(card);
        localStorage.setItem("wordCards", JSON.stringify(saved));

        document.getElementById("cardText").value    = "";
        document.getElementById("cardKeyword").value = "";
        document.getElementById("cardMemo").value    = "";
        document.getElementById("startVerse").value  = "";
        document.getElementById("endVerse").value    = "";

        showToast("💝 말씀 카드가 저장되었어요!");
    }

    function getSavedCards() {
        try { return JSON.parse(localStorage.getItem("wordCards")) || []; }
        catch { return []; }
    }

    let activeKeyword = null;

    function renderCards() {
        const cards   = getSavedCards();
        const kwSet   = [...new Set(cards.map(c => c.keyword).filter(Boolean))];
        const filter  = document.getElementById("keywordFilter");
        const display = document.getElementById("savedCardsDisplay");

        filter.innerHTML = kwSet.map(kw =>
            `<span class="kw-badge ${activeKeyword === kw ? 'active' : ''}" onclick="toggleKeyword('${kw}')">${kw}</span>`
        ).join('');

        const filtered = activeKeyword ? cards.filter(c => c.keyword === activeKeyword) : cards;

        if (filtered.length === 0) {
            display.innerHTML = `<div class="empty-state">아직 저장된 말씀 카드가 없어요.<br>✍️ 카드 생성 탭에서 첫 카드를 만들어 보세요.</div>`;
            return;
        }

        display.innerHTML = [...filtered].reverse().map(c => {
            const realIndex = cards.indexOf(c);
            return `
                <div class="word-card" id="card-${realIndex}">
                    <div class="word-card-ref">📖 ${c.ref} · ${c.date}</div>
                    <div class="word-card-text">${c.text}</div>
                    ${c.keyword ? `<span class="word-card-kw"># ${c.keyword}</span>` : ''}
                    ${c.memo    ? `<div class="word-card-memo">${c.memo}</div>` : ''}
                    <div class="card-actions">
                        <button class="btn-edit" onclick="startEdit(${realIndex})">✏️ 수정</button>
                        <button class="btn-delete" onclick="deleteCard(${realIndex})">🗑️ 삭제</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function deleteCard(index) {
        if (!confirm("이 말씀 카드를 삭제할까요?")) return;
        const cards = getSavedCards();
        cards.splice(index, 1);
        localStorage.setItem("wordCards", JSON.stringify(cards));
        renderCards();
        showToast("카드가 삭제되었어요.");
    }

    function startEdit(index) {
        const cards = getSavedCards();
        const c = cards[index];
        const cardEl = document.getElementById(`card-${index}`);
        cardEl.innerHTML = `
            <div class="word-card-ref">📖 ${c.ref} · ${c.date}</div>
            <div class="edit-form">
                <textarea id="edit-text-${index}" rows="6">${c.text}</textarea>
                <input type="text" id="edit-keyword-${index}" value="${c.keyword || ''}" placeholder="키워드">
                <textarea id="edit-memo-${index}" rows="2" placeholder="묵상 기록">${c.memo || ''}</textarea>
            </div>
            <div class="card-actions">
                <button class="btn-edit" onclick="saveEdit(${index})">💾 저장</button>
                <button class="btn-delete" onclick="renderCards()">✕ 취소</button>
            </div>
        `;
    }

    function saveEdit(index) {
        const cards = getSavedCards();
        cards[index].text    = document.getElementById(`edit-text-${index}`).value.trim();
        cards[index].keyword = document.getElementById(`edit-keyword-${index}`).value.trim();
        cards[index].memo    = document.getElementById(`edit-memo-${index}`).value.trim();
        localStorage.setItem("wordCards", JSON.stringify(cards));
        renderCards();
        showToast("카드가 수정되었어요.");
    }

    function toggleKeyword(kw) {
        activeKeyword = activeKeyword === kw ? null : kw;
        renderCards();
    }

    function switchTab(pId, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pId).classList.add('active');
        btn.classList.add('active');
        if (pId === 'view-panel') renderCards();
    }

    function updateChapters(bookSelectId, chapterSelectId) {
        const bookId = document.getElementById(bookSelectId).value;
        const book   = getBook(bookId);
        const sel    = document.getElementById(chapterSelectId);
        sel.innerHTML = "";
        for (let i = 1; i <= book.chapters; i++) {
            sel.innerHTML += `<option value="${i}">${i}장</option>`;
        }
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2600);
    }

    window.onload = () => {
        populateBookSelect('readBook', otBooks);
        populateBookSelect('cardBook', otBooks);
        updateChapters('readBook', 'readChapter');
        updateChapters('cardBook', 'cardChapter');
        loadBibleVerses();
    };
</script>
