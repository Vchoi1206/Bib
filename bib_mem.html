<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성경 66권 개역한글 암송 프로그램</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.9; padding: 20px; max-width: 800px; margin: 0 auto; background-color: #f4f6f9; color: #333; }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; margin-bottom: 20px; }
        .control-panel { background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; position: sticky; top: 0; z-index: 100; }
        select, button { padding: 12px 18px; font-size: 16px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; transition: all 0.2s; }
        select { background-color: #fff; font-weight: bold; color: #2c3e50; }
        button { background-color: #3498db; color: white; border: none; font-weight: bold; }
        button:hover { background-color: #2980b9; transform: translateY(-1px); }
        .btn-75 { background-color: #e67e22; }
        .btn-75:hover { background-color: #d35400; }
        .btn-85 { background-color: #e74c3c; }
        .btn-85:hover { background-color: #c0392b; }
        .btn-reveal { background-color: #2ecc71; }
        .btn-reveal:hover { background-color: #27ae60; }
        .btn-reset { background-color: #7f8c8d; }
        .btn-reset:hover { background-color: #95a5a6; }
        .bible-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 300px; }
        .verse { margin-bottom: 18px; font-size: 18px; text-align: justify; word-break: keep-all; }
        .verse-num { font-weight: bold; color: #34495e; background: #eaecee; padding: 2px 6px; border-radius: 4px; margin-right: 8px; font-size: 14px; vertical-align: middle; }
        .blank { display: inline; border-bottom: 2px solid #34495e; color: transparent; background-color: #e8ecef; padding: 0 4px; margin: 0 2px; border-radius: 4px; cursor: pointer; user-select: none; transition: all 0.15s; }
        .blank.reveal { color: #27ae60; background-color: #e8f8f5; border-bottom-color: #27ae60; font-weight: bold; }
        .hint-text { text-align: center; color: #7f8c8d; font-size: 14px; margin-top: 10px; margin-bottom: 20px; }
        .loading { text-align: center; font-size: 18px; color: #7f8c8d; padding: 50px 0; }
    </style>
</head>
<body>

    <h1>📖 성경 66권 암송연습 (개역한글)</h1>
    
    <div class="control-panel">
        <select id="bookSelect" onchange="updateChapterOptions()"></select>
        <select id="chapterSelect" onchange="loadVerse()"></select>
        
        <button class="btn-reset" onclick="loadVerse()">원문 보기</button>
        <button class="btn-75" onclick="transformText(0.75)">75% 빈칸</button>
        <button class="btn-85" onclick="transformText(0.85)">85% 빈칸</button>
        <button class="btn-reveal" onclick="revealAll()">정답 보기</button>
    </div>

    <p class="hint-text">💡 빈칸을 터치하거나 클릭하면 해당 단어의 정답이 나타납니다. 다시 누르면 숨겨집니다.</p>

    <div class="bible-box" id="bibleContent">
        <div class="loading">성경 데이터를 불러오는 중입니다...</div>
    </div>

<script>
    // 성경 66권 영문 코드 및 한글 명칭 정의 (yuhwan/Bible-krv 레포지토리 구조 기준)
    const bibleBooks = [
        { id: "gen", name: "창세기", chapters: 50 }, { id: "exo", name: "출애굽기", chapters: 40 },
        { id: "lev", name: "레위기", chapters: 27 }, { id: "num", name: "민수기", chapters: 36 },
        { id: "deu", name: "신명기", chapters: 34 }, { id: "jos", name: "여호수아", chapters: 24 },
        { id: "jdg", name: "사사기", chapters: 21 }, { id: "rut", name: "룻기", chapters: 4 },
        { id: "1sa", name: "사무엘상", chapters: 31 }, { id: "2sa", name: "사무엘하", chapters: 24 },
        { id: "1ki", name: "열왕기상", chapters: 22 }, { id: "2ki", name: "열왕기하", chapters: 25 },
        { id: "1ch", name: "역대상", chapters: 29 }, { id: "2ch", name: "역대하", chapters: 36 },
        { id: "ezr", name: "에스라", chapters: 10 }, { id: "neh", name: "느헤미야", chapters: 13 },
        { id: "est", name: "에스더", chapters: 10 }, { id: "job", name: "욥기", chapters: 42 },
        { id: "psa", name: "시편", chapters: 150 }, { id: "pro", name: "잠언", chapters: 31 },
        { id: "ecc", name: "전도서", chapters: 12 }, { id: "sng", name: "아가", chapters: 8 },
        { id: "isa", name: "이사야", chapters: 66 }, { id: "jer", name: "예레미야", chapters: 52 },
        { id: "lam", name: "예레미야 애가", chapters: 5 }, { id: "ezk", name: "에스겔", chapters: 48 },
        { id: "dan", name: "다니엘", chapters: 12 }, { id: "hos", name: "호세아", chapters: 14 },
        { id: "jol", name: "요엘", chapters: 3 }, { id: "amo", name: "아모스", chapters: 9 },
        { id: "oba", name: "오바댜", chapters: 1 }, { id: "jon", name: "요나", chapters: 4 },
        { id: "mic", name: "미가", chapters: 7 }, { id: "nam", name: "나훔", chapters: 3 },
        { id: "hab", name: "하박국", chapters: 3 }, { id: "zep", name: "스바냐", chapters: 3 },
        { id: "hag", name: "학개", chapters: 2 }, { id: "zec", name: "스가랴", chapters: 14 },
        { id: "mal", name: "말라기", chapters: 4 }, { id: "mat", name: "마태복음", chapters: 28 },
        { id: "mrk", name: "마가복음", chapters: 16 }, { id: "luk", name: "누가복음", chapters: 24 },
        { id: "jhn", name: "요한복음", chapters: 21 }, { id: "act", name: "사도행전", chapters: 28 },
        { id: "rom", name: "로마서", chapters: 16 }, { id: "1co", name: "고린도전서", chapters: 16 },
        { id: "2co", name: "고린도후서", chapters: 13 }, { id: "gal", name: "갈라디아서", chapters: 6 },
        { id: "eph", name: "에베소서", chapters: 6 }, { id: "php", name: "빌립보서", chapters: 4 },
        { id: "col", name: "골로새서", chapters: 4 }, { id: "1th", name: "데살로니가전서", chapters: 5 },
        { id: "2th", name: "데살로니가후서", chapters: 3 }, { id: "1ti", name: "디모데전서", chapters: 6 },
        { id: "2ti", name: "디모데후서", chapters: 4 }, { id: "tit", name: "디도서", chapters: 3 },
        { id: "phm", name: "빌레몬서", chapters: 1 }, { id: "heb", name: "히브리서", chapters: 13 },
        { id: "jas", name: "야고보서", chapters: 5 }, { id: "1pe", name: "베드로전서", chapters: 5 },
        { id: "2pe", name: "베드로후서", chapters: 3 }, { id: "1jn", name: "요한일서", chapters: 5 },
        { id: "2jn", name: "요한이서", chapters: 1 }, { id: "3jn", name: "요한삼서", chapters: 1 },
        { id: "jud", name: "유다서", chapters: 1 }, { id: "rev", name: "요한계시록", chapters: 22 }
    ];

    let currentBookData = null; // 현재 불러온 권의 전체 장 데이터 저장

    // 초기 설정: 성경 선택 드롭다운 채우기
    function init() {
        const bookSelect = document.getElementById("bookSelect");
        bookSelect.innerHTML = "";
        
        bibleBooks.forEach(book => {
            const option = document.createElement("option");
            option.value = book.id;
            option.textContent = book.name;
            bookSelect.appendChild(option);
        });

        // 기본값으로 창세기 설정 및 장 업데이트
        updateChapterOptions();
    }

    // 선택된 성경의 장 개수에 맞게 장 선택 드롭다운 업데이트
    function updateChapterOptions() {
        const bookId = document.getElementById("bookSelect").value;
        const selectedBook = bibleBooks.find(b => b.id === bookId);
        const chapterSelect = document.getElementById("chapterSelect");
        chapterSelect.innerHTML = "";

        for (let i = 1; i <= selectedBook.chapters; i++) {
            const option = document.createElement("option");
            option.value = i;
            option.textContent = `${i}장`;
            chapterSelect.appendChild(option);
        }

        // 새 성경 데이터를 GitHub에서 서버 통신(Fetch)으로 가져옴
        fetchBibleBook(bookId);
    }

    // 깃허브 오픈소스 저장소에서 해당 성경 권의 JSON 데이터를 원격으로 가져오는 함수
    function fetchBibleBook(bookId) {
        const container = document.getElementById("bibleContent");
        container.innerHTML = '<div class="loading">📖 깃허브에서 성경 데이터를 가져오는 중...</div>';
        
        // yuhwan/Bible-krv의 raw 깃허브 URL 주소 활용
        const url = `https://raw.githubusercontent.com/yuhwan/Bible-krv/master/krv/${bookId}.json`;

        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error("데이터를 가져오지 못했습니다.");
                return response.json();
            })
            .then(data => {
                currentBookData = data; // 데이터 저장
                loadVerse(); // 데이터 로드 성공 시 구절 출력
            })
            .catch(error => {
                container.innerHTML = `<div class="loading" style="color:red;">⚠️ 에러 발생: 데이터를 불러오지 못했습니다.<br>인터넷 연결을 확인해 주세요.</div>`;
                console.error(error);
            });
    }

    // 현재 선택된 장의 본문을 화면에 뿌려주는 함수
    function loadVerse() {
        if (!currentBookData) return;
        
        const chapter = document.getElementById("chapterSelect").value;
        // GitHub 데이터 구조는 [{"chapter": 1, "verse": 1, "text": "... "}, ...] 형태임
        const verses = currentBookData.filter(v => v.chapter == chapter);
        const container = document.getElementById("bibleContent");
        container.innerHTML = "";

        if(verses.length === 0) {
            container.innerHTML = '<div class="loading">해당 장의 데이터가 없습니다.</div>';
            return;
        }

        verses.forEach(v => {
            const div = document.createElement("div");
            div.className = "verse";
            div.innerHTML = `<span class="verse-num">${v.verse}</span><span class="verse-text">${v.text}</span>`;
            container.appendChild(div);
        });
    }

    // 지정된 확률에 따라 본문을 빈칸 뚫기 문장으로 변환하는 함수
    function transformText(rate) {
        if (!currentBookData) return;

        const chapter = document.getElementById("chapterSelect").value;
        const verses = currentBookData.filter(v => v.chapter == chapter);
        const container = document.getElementById("bibleContent");
        container.innerHTML = "";

        verses.forEach(v => {
            const div = document.createElement("div");
            div.className = "verse";
            
            // 공백 기준으로 단어를 분리
            const words = v.text.split(" ");
            const transformedWords = words.map(word => {
                // 특정 확률(rate)로 단어를 숨김 처리
                if (Math.random() < rate) {
                    return `<span class="blank" onclick="this.classList.toggle('reveal')">${word}</span>`;
                }
                return word;
            });

            div.innerHTML = `<span class="verse-num">${v.verse}</span><span>${transformedWords.join(" ")}</span>`;
            container.appendChild(div);
        });
    }

    // 모든 빈칸의 정답을 한 번에 보여주는 함수
    function revealAll() {
        const blanks = document.querySelectorAll('.blank');
        blanks.forEach(b => b.classList.add('reveal'));
    }

    // 페이지 시작 시 작동
    window.onload = init;
</script>
</body>
</html>
